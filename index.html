<!DOCTYPE html>

<head>

    <title>عربـتِك 🛒🤎</title>
    
    <!-- خطوط عربية حديثة -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Cairo', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            bg: '#F5F0E6',       
                            panel: '#EADFC8',    
                            card: '#FCFAF8',     
                            blue: '#2563EB',     
                            blueHover: '#1D4ED8',
                            red: '#DC2626',      
                            redHover: '#B91C1C',
                            green: '#16A34A',    
                            greenHover: '#15803D',
                            textMain: '#292524', 
                            textMuted: '#78716C' 
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            background-color: #F5F0E6;
            touch-action: none; 
            overflow: hidden;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes ripple {
            0% { transform: scale(1); opacity: 0.4; }
            100% { transform: scale(2.5); opacity: 0; }
        }
        .mic-ripple::before, .mic-ripple::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.3);
            z-index: -1;
            animation: ripple 2s infinite cubic-bezier(0.0, 0.0, 0.2, 1);
        }
        .mic-ripple::after {
            animation-delay: 1s;
        }

        /* أنيميشن ناعم لرسم المسار على الخريطة */
        .path-line {
            stroke-dasharray: 4000;
            stroke-dashoffset: 4000;
            animation: drawPath 3s ease-in-out forwards;
        }
        @keyframes drawPath {
            to { stroke-dashoffset: 0; }
        }

        .location-pulse {
            animation: pulse-dot 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); box-shadow: 0 0 15px rgba(59,130,246,0.5); }
            50% { opacity: 0.8; transform: scale(1.1); box-shadow: 0 0 30px rgba(59,130,246,0.8); }
        }

        /* أنيميشن موجات الصوت للمساعد */
        @keyframes sound-wave {
            0%, 100% { height: 8px; opacity: 0.5; }
            50% { height: 32px; opacity: 1; }
        }
        .sound-bar {
            animation: sound-wave 1s ease-in-out infinite;
            border-radius: 9999px;
            background-color: white;
            width: 4px;
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col font-sans text-brand-textMain antialiased">

                            <div class="w-[12%] bg-[#E8DECE] rounded-md border border-[#CDBEAA] shadow-sm flex items-center justify-center font-black text-3xl text-gray-500 z-10">12</div>
                            <div class="w-[12%] bg-[#E8DECE] rounded-md border border-[#CDBEAA] shadow-sm flex items-center justify-center font-black text-3xl text-gray-500 z-10">11</div>
                            <div class="w-[12%] bg-[#E8DECE] rounded-md border border-[#CDBEAA] shadow-sm flex items-center justify-center font-black text-3xl text-gray-500 z-10">10</div>
                            <div class="w-[12%] bg-[#E8DECE] rounded-md border border-[#CDBEAA] shadow-sm flex items-center justify-center font-black text-3xl text-gray-500 z-10">9</div>

                        <!-- ممر سفلي (12%) للمشي تتواجد فيه العربة -->

                    <!-- طبقة الرسم (SVG Path) -->
                    <svg class="absolute inset-0 w-full h-full pointer-events-none z-20" viewBox="0 0 1000 1000" preserveAspectRatio="none">
                        
                        <!-- مسار منتج 22: يمشي في الممر الأيسر (170) ثم ينحرف للرف (280) -->
                        <path id="path-22" d="M 500 940 L 200 940 Q 170 940 170 910 L 170 260 L 280 260" fill="none" stroke="#3b82f6" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" class="hidden" />

                        <!-- مسار منتج 19: يمشي في الممر الأيمن (830) ثم ينحرف للرف (940) -->
                        <path id="path-19" d="M 500 940 L 800 940 Q 830 940 830 910 L 830 260 L 940 260" fill="none" stroke="#3b82f6" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" class="hidden" />
                        
                        <!-- المسار الذكي المحدث (التوجه للكل): يمشي مستقيم، ينحرف للمنتج، يرجع للمستقيم ويكمل -->
                        <path id="path-all" d="M 500 940 L 800 940 Q 830 940 830 910 L 830 740 L 940 740 L 830 740 L 830 260 L 940 260 L 830 260 L 830 90 Q 830 60 800 60 L 200 60 Q 170 60 170 90 L 170 260 L 280 260" fill="none" stroke="#3b82f6" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" class="hidden" />
                        
                        <!-- الدبابيس (النقاط الحمراء) تقع في منتصف الرفوف تماماً -->
                        <circle id="pin-22" class="pin-22 pin-all hidden" cx="280" cy="260" r="16" fill="#ef4444" stroke="#fff" stroke-width="4" />
                        <circle id="pin-9" class="pin-9 pin-all hidden" cx="940" cy="740" r="16" fill="#ef4444" stroke="#fff" stroke-width="4" />
                        <circle id="pin-19" class="pin-19 pin-all hidden" cx="940" cy="260" r="16" fill="#ef4444" stroke="#fff" stroke-width="4" />
                    </svg>

                    <!-- موقع العربة الحالي (مثبت في أسفل الممر السفلي) -->
                    <div class="absolute bottom-[2%] left-1/2 -translate-x-1/2 z-30 flex items-center justify-center">
                        <div class="w-14 h-14 bg-white rounded-full flex items-center justify-center shadow-[0_0_20px_rgba(59,130,246,0.6)] border-[4px] border-brand-blue location-pulse relative">

                    <!-- أزرار التحكم -->

                        <button class="flex-1 bg-white text-brand-red border border-brand-red hover:bg-brand-red hover:text-white py-1.5 rounded-md text-[11px] font-bold shadow-sm transition-colors active:scale-95">حذف</button>
                    </div>
                </div>

                <!-- منتج 2 (عصير يوجه لممر 9 - تحت يسار) -->

                    <div class="flex items-center gap-2">

                        <button class="flex-1 bg-white text-brand-red border border-brand-red hover:bg-brand-red hover:text-white py-1.5 rounded-md text-[11px] font-bold shadow-sm transition-colors active:scale-95">حذف</button>

    <!-- Modal التفاعل الصوتي -->
    <div id="voice-modal" class="fixed inset-0 bg-black/80 backdrop-blur-md z-50 flex flex-col items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300">
        
        <!-- زر الإغلاق -->
        <button onclick="closeVoiceModal()" class="absolute top-8 right-8 text-white/50 hover:text-white transition-colors cursor-pointer z-50">
            <i class="ph ph-x text-4xl"></i>
        </button>

        <!-- منطقة المايك -->
        <div class="relative flex items-center justify-center w-64 h-64 mb-2">
            <!-- إطار متقطع دائرى يلف حول المايك -->
            <div class="absolute inset-6 rounded-full border-[1.5px] border-dashed border-white/30 animate-[spin_15s_linear_infinite] pointer-events-none"></div>
            
            <div id="mic-pulse" class="absolute inset-0 rounded-full"></div>
            <button onclick="closeVoiceModal()" class="relative w-28 h-28 bg-white rounded-full flex items-center justify-center shadow-[0_0_30px_rgba(255,255,255,0.3)] z-10 cursor-pointer hover:scale-105 transition-transform">

            </button>
        </div>
        
        <h2 class="text-white text-4xl font-bold drop-shadow-md mb-6">أنا أستمع...</h2>

        <!-- موجات الصوت (Sound Waveform) -->
        <div class="flex items-center justify-center gap-2 mb-12 h-10">
            <div class="sound-bar" style="animation-delay: 0.0s"></div>
            <div class="sound-bar" style="animation-delay: 0.2s"></div>
            <div class="sound-bar" style="animation-delay: 0.4s"></div>
            <div class="sound-bar" style="animation-delay: 0.1s"></div>
            <div class="sound-bar" style="animation-delay: 0.3s"></div>

        <!-- المقترحات المساعدة -->
        <div class="flex flex-col items-center opacity-0 transform translate-y-4 transition-all duration-500 delay-300" id="voice-suggestions">
            <p class="text-white/60 text-sm mb-4">يمكنك أن تسألني:</p>
            <div class="flex items-center gap-3">
                <button class="flex items-center gap-2 border border-white/30 text-white px-6 py-3 rounded-full hover:bg-white/10 hover:border-white transition-all text-sm cursor-pointer shadow-sm">

                    <i class="ph-fill ph-shopping-cart text-xl"></i>
                    "أضف تفاح إلى السلة"

    <!-- ملفات الجافاسكربت لإدارة التفاعل -->
    <script>
        function drawRoute(routeId) {
            document.querySelectorAll('svg path').forEach(p => {
                p.classList.add('hidden');
                p.classList.remove('path-line'); 
            });
            document.querySelectorAll('svg circle').forEach(c => c.classList.add('hidden'));

            const path = document.getElementById(`path-${routeId}`);
            if(path) {
                path.classList.remove('hidden');
                void path.offsetWidth; 
                path.classList.add('path-line');
            }

            const pins = document.querySelectorAll(`.pin-${routeId}`);
            pins.forEach(pin => {
                pin.classList.remove('hidden');
            });

            document.getElementById('btn-cancel-route').classList.remove('hidden');
        }

        function cancelRoute() {
            document.querySelectorAll('svg path').forEach(p => p.classList.add('hidden'));
            document.querySelectorAll('svg circle').forEach(c => c.classList.add('hidden'));
            document.getElementById('btn-cancel-route').classList.add('hidden');
        }

        function openVoiceModal() {
            const modal = document.getElementById('voice-modal');
            const pulse = document.getElementById('mic-pulse');
            const suggestions = document.getElementById('voice-suggestions');
            
            modal.classList.remove('opacity-0', 'pointer-events-none');
            pulse.classList.add('mic-ripple');
            
            setTimeout(() => {
                suggestions.classList.remove('opacity-0', 'translate-y-4');
            }, 150);

            setTimeout(() => {
                if(!modal.classList.contains('pointer-events-none')) {
                    closeVoiceModal();
                    drawRoute('19'); 
                }
            }, 6000);
        }

        function closeVoiceModal() {
            const modal = document.getElementById('voice-modal');
            const pulse = document.getElementById('mic-pulse');
            const suggestions = document.getElementById('voice-suggestions');
            
            modal.classList.add('opacity-0', 'pointer-events-none');
            suggestions.classList.add('opacity-0', 'translate-y-4');

            setTimeout(() => {
                pulse.classList.remove('mic-ripple');
            }, 300);
        }
    </script>
</body>
</html>
